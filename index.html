<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>IP Address Tracker</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./img/favicon-32x32.png"
    />

    <!-- Google font connect - Rubik -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet stylesheet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="./styles/style.css" />

    <!-- Leaflet CDN link-->
    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- Ignore -->
    <script defer src="./scripts/script.js"></script>

    <!-- Application JavScript -->
    <script defer src="./scripts/app.js"></script>
  </head>
  <body>
    <header>
      <h1>IP Address Tracker</h1>

      <form id="search-form">
        <label for="search-input" class="sr-only">
          Search for any IP address or domain
        </label>
        <input
          type="text"
          id="search-input"
          placeholder="Search for any IP address or domain..."
        />

        <button type="submit" aria-label="search">
          <img src="./img/icon-arrow.svg" alt="" />
        </button>
      </form>

      <div id="info-card">
        <div class="info-item">
          <p class="info-label">IP Address</p>
          <p id="display-ip">--</p>
        </div>
        <div class="info-item">
          <p class="info-label">Location</p>
          <p id="display-location">--</p>
        </div>
        <div class="info-item">
          <p class="info-label">Timezone</p>
          <p id="display-timezone">--</p>
        </div>
        <div class="info-item">
          <p class="info-label">ISP</p>
          <p id="display-isp">--</p>
        </div>
      </div>
    </header>

    <main>
      <div id="map"></div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      <a href="https://github.com/zstem001hz-droid">Coded by Zac White</a>.
    </footer>
  </body>
</html>
